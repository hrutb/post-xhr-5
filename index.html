    <body>

         <div class="container">
            <div class="row mt-5">
                <div class="col-md-6 offset-md-3">
                  <div class="card">
                    <div class="card-header bg-primary text-center">
                         <h3>Blog Card</h3>
                    </div>
                    <div class="card-body">
                          <form action="" id="postForm">
                            <div class="form-group">
                                <label for="title">Title*</label>
                                <input type="text" class="form-control" id="title">
                            </div>
                           
                            <div class="form-group">
                                <label for="content">Content*</label>
                                <input type="text" class="form-control" id="content">
                            </div> 
                            
                            <div class="form-group">
                                <label for="userId">User Id*</label>
                                <select type="text" class="form-control" id="userId">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                            </div> 
                             <button class="btn btn-block btn-outline-primary" id="addPost">Add Post</button>
                             <button class="btn btn-block btn-outline-primary d-none" id="updatePost" type="button">Update Post</button>

                          </form>
                    </div>
                  </div>
                </div>
            </div>

            <div class="row" id="postContainer">
